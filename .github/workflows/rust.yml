name: Rust CI

on:
  push:
    branches: [ main ]
    paths:
      - 'crates/mevlog/**'
      - 'Cargo.lock'
  pull_request:
    branches: [ main ]
    paths:
      - 'crates/mevlog/**'
      - 'Cargo.lock'

jobs:
  build:
    name: test ${{ matrix.rust }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - 1.91
          - stable
          - nightly
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-audit
      - name: Check
        run: cargo check -p mevlog
      - name: Check tokio-console feature flag
        run: cargo check -p mevlog --features tokio-console
      - name: Check seed-db feature flag
        run: cargo check -p mevlog --features seed-db
      - name: Check hotpath feature flag
        run: cargo check -p mevlog --features hotpath
      - name: Check tui feature flag
        run: cargo check -p mevlog --features tui
      - name: Fmt
        if: matrix.rust == 'stable'
        run: cargo fmt -p mevlog --check
      - name: Lint
        if: matrix.rust == 'stable'
        run: cargo clippy -p mevlog --all-features -- -D warnings
      - name: Audit
        if: matrix.rust == 'stable'
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2025-0055
      - name: Run tests
        run: cargo test -p mevlog --lib -- --nocapture
